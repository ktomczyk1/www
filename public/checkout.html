<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Finalnie zamówienie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header -->
<div class="checkout-header">
    <div class="checkout-container">
        <h1 class="checkout-title">
            <i class="bi bi-credit-card"></i> Finalizacja zamówienia
        </h1>
    </div>
</div>

<!-- Checkout Content -->
<div class="checkout-container">
    <!-- Podsumowanie zamówienia -->
    <div class="order-summary" id="orderSummary"></div>

    <!-- Formularz -->
    <form id="form" class="form-card">
        <div class="form-section-title">
            <i class="bi bi-person"></i> Dane osobowe
        </div>

        <div class="form-group">
            <label for="firstName">Imię *</label>
            <input type="text" id="firstName" placeholder="Wpisz swoje imię" required>
        </div>

        <div class="form-group">
            <label for="lastName">Nazwisko *</label>
            <input type="text" id="lastName" placeholder="Wpisz swoje nazwisko" required>
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" placeholder="wpisz@email.com" required>
        </div>

        <div class="form-group">
            <label for="phone">Telefon</label>
            <input type="tel" id="phone" placeholder="+48 XXX XXX XXX">
        </div>

        <div class="form-group">
            <label for="address">Adres dostawy *</label>
            <textarea id="address" placeholder="Ulica, numer domu, kod pocztowy, miasto" required></textarea>
        </div>

        <div class="button-group" style="margin-top: 2rem;">
            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="bi bi-check-circle"></i> Złóż zamówienie
            </button>
            <button type="button" class="btn-back" onclick="goBack()">
                <i class="bi bi-arrow-left"></i> Powrót
            </button>
        </div>
    </form>
</div>

<script src="js/checkout.js"></script>

</body>
</html>
