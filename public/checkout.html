<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finalizacja zamówienia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header -->
<div class="checkout-header">
    <div class="checkout-container">
        <h1 class="checkout-title">
            <i class="bi bi-credit-card"></i> Finalizacja zamówienia
        </h1>
    </div>
</div>

<!-- Checkout Content -->
<div class="checkout-container">
    <!-- Podsumowanie zamówienia -->
    <div class="order-summary" id="orderSummary"></div>

    <!-- Formularz -->
    <form id="form" class="form-card" novalidate>
        <div class="form-section-title">
            <i class="bi bi-person"></i> Dane osobowe
        </div>

        <div class="form-group">
            <label for="firstName">Imię *</label>
            <input type="text" id="firstName" name="firstName" placeholder="Wpisz swoje imię" autocomplete="given-name" maxlength="50" required>
            <span class="form-error" id="firstNameError" role="alert"></span>
        </div>

        <div class="form-group">
            <label for="lastName">Nazwisko *</label>
            <input type="text" id="lastName" name="lastName" placeholder="Wpisz swoje nazwisko" autocomplete="family-name" maxlength="50" required>
            <span class="form-error" id="lastNameError" role="alert"></span>
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" placeholder="wpisz@email.com" autocomplete="email" maxlength="254" required>
            <span class="form-error" id="emailError" role="alert"></span>
        </div>

        <div class="form-group">
            <label for="phone">Telefon</label>
            <input type="tel" id="phone" name="phone" placeholder="+48 XXX XXX XXX" autocomplete="tel" maxlength="20">
            <span class="form-error" id="phoneError" role="alert"></span>
        </div>

        <div class="form-section-title">
            <i class="bi bi-geo-alt"></i> Adres dostawy
        </div>

        <div class="form-group">
            <label for="street">Ulica *</label>
            <input type="text" id="street" name="street" placeholder="np. Kwiatowa" autocomplete="address-line1" maxlength="100" required>
            <span class="form-error" id="streetError" role="alert"></span>
        </div>

        <div class="form-row-two">
            <div class="form-group">
                <label for="houseNumber">Numer domu *</label>
                <input type="text" id="houseNumber" name="houseNumber" placeholder="np. 12" autocomplete="address-line2" maxlength="10" required>
                <span class="form-error" id="houseNumberError" role="alert"></span>
            </div>
            <div class="form-group">
                <label for="apartmentNumber">Numer lokalu</label>
                <input type="text" id="apartmentNumber" name="apartmentNumber" placeholder="np. 4" maxlength="10">
                <span class="form-error" id="apartmentNumberError" role="alert"></span>
            </div>
        </div>

        <div class="form-row-two">
            <div class="form-group">
                <label for="postalCode">Kod pocztowy *</label>
                <input type="text" id="postalCode" name="postalCode" placeholder="00-001" autocomplete="postal-code" maxlength="6" required>
                <span class="form-error" id="postalCodeError" role="alert"></span>
            </div>
            <div class="form-group">
                <label for="city">Miasto *</label>
                <input type="text" id="city" name="city" placeholder="np. Warszawa" autocomplete="address-level2" maxlength="80" required>
                <span class="form-error" id="cityError" role="alert"></span>
            </div>
        </div>

        <div class="payment-info">
            <i class="bi bi-shield-check"></i>
            <span>Po kliknięciu zostaniesz przekierowany do płatności Stripe Sandbox.</span>
        </div>

        <div class="button-group">
            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="bi bi-credit-card"></i> Złóż zamówienie i zapłać
            </button>
            <button type="button" class="btn-back" onclick="goBack()">
                <i class="bi bi-arrow-left"></i> Powrót
            </button>
        </div>
    </form>
</div>

<div id="paymentSuccessModal" class="payment-success-overlay" aria-hidden="true">
    <div class="payment-success-card" role="dialog" aria-modal="true">
        <div class="payment-success-icon">
            <i class="bi bi-check-lg"></i>
        </div>
        <h2>Zamówienie opłacone</h2>
        <p>Dziękujemy za zakupy!</p>
        <a href="/index.html" class="btn-submit payment-success-btn">Wróć do sklepu</a>
    </div>
</div>

<script src="js/cartStock.js"></script>
<script src="js/checkout.js"></script>

</body>
</html>
