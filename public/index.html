<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sklep</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="container-lg">
        <div class="row align-items-center">
            <div class="col">
                <a href="/" class="store-logo">
                    <img src="/uploads/Logo_sklepu.jpeg" alt="Logo sklepu" class="logo-image">
                </a>
            </div>
            <div class="col-auto header-controls">
                <div class="search-wrapper">
                    <input type="search" id="productSearch" placeholder="Szukaj produktów..." aria-label="Szukaj produktów">
                </div>
                <div class="cart-dropdown" id="cartDropdownWrapper" onmouseover="openCartDropdown()" onmouseout="closeCartDropdownDelay()">
                    <button class="cart-btn" id="cartToggleBtn">
                        <i class="bi bi-bag"></i>
                        <span>Koszyk</span>
                    </button>
                    <div class="cart-info" id="cartInfo" style="display: none;"></div>
                    <div class="cart-dropdown-menu" id="cartDropdownMenu">
                        <div class="cart-dropdown-header">
                            <span>Twój koszyk</span>
                            <button class="close-btn" onclick="closeCartDropdown()">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                        <div class="cart-dropdown-items" id="cartDropdownItems">
                            <!-- Items rendered here -->
                        </div>
                        <div class="cart-dropdown-footer">
                            <a href="/cart.html" class="btn-checkout">Przejdź do koszyka</a>
                            <button class="btn-clear" id="clearCartBtnDropdown" onclick="clearCartWithConfirm()" style="display: none;">
                                <i class="bi bi-trash3"></i> Wyczyść
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Main Content -->
<div class="container-lg main-layout">
    <aside class="sidebar">
        <h2 class="sidebar-title">Kategorie</h2>
        <div class="categories-container" id="categories">
            <!-- Kategorie będą wstawione tutaj przez JS -->
        </div>
    </aside>
    <main class="content">
        <div class="products-grid" id="products"></div>
    </main>
</div>

<!-- Product Modal -->
<div id="productModal" class="product-modal-overlay" aria-hidden="true">
    <div class="product-modal-container" role="dialog" aria-modal="true">
        <button class="modal-close-btn" onclick="closeProductModal()" aria-label="Zamknij">
            <i class="bi bi-x-lg"></i>
        </button>
        <div class="product-modal-inner">
            <div class="product-modal-image">
                <img id="modalImage" src="/uploads/No_Image_Available.jpg" alt="Zdjęcie produktu">
            </div>
            <div class="product-modal-details">
                <h2 id="modalTitle"></h2>
                <div class="product-modal-price-stock">
                    <div class="price-section">
                        <span class="label">Cena:</span>
                        <span class="price" id="modalPrice"></span>
                    </div>
                    <div class="stock-section">
                        <span class="label">Dostępność:</span>
                        <span class="stock" id="modalStock"></span>
                    </div>
                </div>
                <div class="product-modal-description">
                    <h4>Opis i Parametry</h4>
                    <p id="modalDescription"></p>
                </div>
                <div class="product-modal-footer">
                    <div class="modal-quantity-controls">
                        <button class="qty-btn-modal" id="modalQtyMinus" onclick="decrementModalQuantity()">
                            <i class="bi bi-dash-lg"></i>
                        </button>
                        <span class="qty-display-modal" id="modalQtyDisplay">1</span>
                        <button class="qty-btn-modal" id="modalQtyPlus" onclick="incrementModalQuantity()">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                    <button onclick="addMultipleToCart()" class="btn-add-modal">
                        <i class="bi bi-plus-lg"></i> Dodaj do koszyka
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/index.js"></script>

</body>
</html>
